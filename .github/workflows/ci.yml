name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Audit threshold is `critical` (not `high`) deliberately.
      # `npm audit fix` (non-breaking) resolves nothing here, and the only
      # remaining advisories are HIGH/MODERATE in build-chain *devDependencies*
      # that are never shipped to users: @angular/build, @angular-devkit/build-angular,
      # @compodoc/compodoc, webpack-dev-server, esbuild, vite, undici, piscina,
      # picomatch, http-proxy-middleware, @babel/core and uuid. The only available
      # fixes require breaking downgrades (e.g. @angular-devkit/build-angular@0.802.2),
      # which would regress the toolchain by years. Until upstream Angular ships
      # patched ranges, `high` cannot pass; `critical` is the lowest level that does.
      # Re-evaluate (and tighten toward `high`) on each Angular/toolchain bump.
      - name: Audit dependencies
        run: npm audit --audit-level=critical

      - name: Typecheck
        run: npm run typecheck

      - name: Prettier format check
        run: npm run format:check

      - name: Stylelint
        run: npm run lint:styles

      - name: ESLint
        run: npm run lint

      # Build the design tokens from source and fail if the committed preset.ts
      # is stale. Catches drift between tools/token-pipeline and the generated
      # output, and proves the pipeline runs from a clean checkout.
      - name: Validate generated design tokens
        run: |
          npm ci --prefix tools/token-pipeline
          npm run build:tokens
          git diff --exit-code -- src/app/design-system/tokens/preset.ts

      - name: Unit tests
        run: npm run test -- --watch=false

      - name: Production build
        run: npm run build

  # Note: E2E (Playwright) is intentionally NOT run in CI — the runner's cold
  # Chromium download stalls indefinitely. Run it locally with `npm run e2e`.

  storybook:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: storybook-static/

      - id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
