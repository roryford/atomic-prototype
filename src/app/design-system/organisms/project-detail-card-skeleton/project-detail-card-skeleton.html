<div class="detail-card" aria-busy="true" aria-label="Loading project">
  <div class="skeleton-header">
    <ds-skeleton shape="circle" size="4rem" />
    <div class="skeleton-title">
      <ds-skeleton width="200px" height="28px" />
      <ds-skeleton width="80px" height="24px" />
    </div>
  </div>

  <ds-divider />

  <div class="info-section">
    @for (_ of placeholders; track $index) {
      <div class="field">
        <ds-skeleton width="80px" height="14px" />
        <ds-skeleton width="100%" height="38px" />
      </div>
    }
    <div class="field full-width">
      <ds-skeleton width="80px" height="14px" />
      <ds-skeleton width="100%" height="38px" />
    </div>
  </div>
</div>
